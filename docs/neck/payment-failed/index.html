<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Оплату не завершено</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(180deg, #f5f7fb 0%, #eef2f7 100%);
      color: #1f2937;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.12);
      padding: 32px 24px;
      text-align: center;
    }

    .icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: #fee2e2;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 28px;
      line-height: 1.2;
      color: #111827;
    }

    p {
      margin: 0 0 14px;
      font-size: 16px;
      line-height: 1.6;
      color: #4b5563;
    }

    .order-box {
      margin: 22px 0;
      padding: 14px 16px;
      border-radius: 14px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      font-size: 14px;
      color: #374151;
      word-break: break-word;
      display: none;
    }

    .actions {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      border-radius: 14px;
      padding: 0 18px;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      transition: 0.2s ease;
      cursor: pointer;
      border: none;
    }

    .btn-primary {
      background: #f59e0b;
      color: #ffffff;
    }

    .btn-primary:hover {
      background: #ea8c00;
    }

    .btn-secondary {
      background: #eef2ff;
      color: #1e3a8a;
    }

    .btn-secondary:hover {
      background: #e0e7ff;
    }

    .note {
      margin-top: 18px;
      font-size: 14px;
      color: #6b7280;
    }

    @media (max-width: 480px) {
      .card {
        padding: 28px 18px;
      }

      h1 {
        font-size: 24px;
      }

      p {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="icon">✕</div>

    <h1>Оплату не завершено</h1>

    <p>
      Схоже, платіж не був підтверджений або був скасований.
    </p>

    <p>
      Гроші не повинні списатися. Спробуй оплатити ще раз або перевір інший спосіб оплати.
    </p>

    <div class="order-box" id="orderBox"></div>

    <div class="actions">
      <a class="btn btn-primary" href="/foot/">
        Повернутися до сторінки курсу
      </a>

      <button class="btn btn-secondary" type="button" onclick="window.history.back()">
        Назад
      </button>
    </div>

    <div class="note">
      Якщо проблема повторюється, напиши в підтримку та вкажи номер замовлення.
    </div>
  </main>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const orderRef = params.get("order_ref");
      const box = document.getElementById("orderBox");

      if (orderRef) {
        box.style.display = "block";
        box.textContent = "Номер замовлення: " + orderRef;
      }
    })();
  </script>
</body>
</html>
